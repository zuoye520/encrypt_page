<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>内容加密/解密工具</title>
  <style>
    :root {
      --bg: #f6f8fc;
      --card: #ffffff;
      --text: #1f2430;
      --muted: #5b6475;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --success: #0e9f6e;
      --danger: #dc2626;
      --border: #dbe2f0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #f7f9ff 0%, #eef3ff 100%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .container {
      width: min(900px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 12px 36px rgba(31, 36, 48, 0.08);
      padding: 24px;
    }

    .banner {
      margin-bottom: 14px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #bfdbfe;
      background: #eff6ff;
      color: #1e3a8a;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 24px;
      line-height: 1.3;
    }

    .desc {
      color: var(--muted);
      margin: 0 0 20px;
      font-size: 14px;
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 14px;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      font-size: 14px;
      line-height: 1.45;
      outline: none;
      transition: border-color 0.2s;
      background: #fff;
    }

    input:focus,
    textarea:focus {
      border-color: var(--primary);
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 4px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.08s ease, opacity 0.2s ease, background 0.2s ease;
    }

    button:active {
      transform: translateY(1px);
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-secondary {
      background: #e8eefc;
      color: #20408f;
    }

    .btn-secondary:hover {
      background: #dce7fc;
    }

    .btn-danger {
      background: #fee2e2;
      color: #991b1b;
    }

    .btn-danger:hover {
      background: #fecaca;
    }

    .tips {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      background: #f8fafc;
      border: 1px dashed #d3dce9;
      border-radius: 10px;
      padding: 10px 12px;
    }

    .status {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
      display: none;
    }

    .status.success {
      display: block;
      background: #dcfce7;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }

    .status.error {
      display: block;
      background: #fee2e2;
      color: #7f1d1d;
      border: 1px solid #fecaca;
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="banner">NXDAO工作室专用加解密工具</div>
    <h1>内容加密/解密工具</h1>
    <p class="desc">浏览器端 AES-256-CBC（输出格式：<code>ivHex:cipherHex</code>）。</p>

    <div class="grid">
      <div>
        <label for="keyInput">密钥（最少 1 字节）</label>
        <input id="keyInput" type="text" placeholder="请输入任意长度密钥（至少 1 字节）" />
      </div>

      <div>
        <label for="sourceInput">输入内容（明文或密文）</label>
        <textarea id="sourceInput" placeholder="加密时输入明文；解密时输入 ivHex:cipherHex"></textarea>
      </div>

      <div class="actions">
        <button class="btn-primary" id="encryptBtn">加密</button>
        <button class="btn-primary" id="decryptBtn">解密</button>
        <button class="btn-secondary" id="copyBtn">复制结果</button>
        <button class="btn-danger" id="clearBtn">清空</button>
      </div>

      <div>
        <label for="resultOutput">结果</label>
        <textarea id="resultOutput" readonly placeholder="操作结果会显示在这里"></textarea>
      </div>
    </div>

    <div class="tips">
      说明：该页面使用 Web Crypto API，并将输入密钥先做 SHA-256 派生后用于 <code>aes-256-cbc</code>。
    </div>

    <div id="status" class="status"></div>
  </main>

  <script>
    const keyInput = document.getElementById("keyInput");
    const sourceInput = document.getElementById("sourceInput");
    const resultOutput = document.getElementById("resultOutput");
    const statusEl = document.getElementById("status");

    const encoder = new TextEncoder();
    const decoder = new TextDecoder();

    function setStatus(message, type) {
      statusEl.textContent = message;
      statusEl.className = "status " + type;
    }

    function clearStatus() {
      statusEl.textContent = "";
      statusEl.className = "status";
    }

    function bytesToHex(bytes) {
      return Array.from(bytes)
        .map((b) => b.toString(16).padStart(2, "0"))
        .join("");
    }

    function hexToBytes(hex) {
      if (!/^[0-9a-fA-F]*$/.test(hex) || hex.length % 2 !== 0) {
        throw new Error("不是合法的十六进制字符串");
      }
      const out = new Uint8Array(hex.length / 2);
      for (let i = 0; i < hex.length; i += 2) {
        out[i / 2] = parseInt(hex.slice(i, i + 2), 16);
      }
      return out;
    }

    async function importAesKey(secretKey) {
      const keyBytes = encoder.encode(secretKey);
      if (keyBytes.length < 1) {
        throw new Error("密钥长度必须至少是 1 字节（UTF-8）");
      }
      const derivedKey = await crypto.subtle.digest("SHA-256", keyBytes);
      return crypto.subtle.importKey(
        "raw",
        derivedKey,
        { name: "AES-CBC" },
        false,
        ["encrypt", "decrypt"]
      );
    }

    async function encrypt(text, secretKey) {
      const iv = crypto.getRandomValues(new Uint8Array(16));
      const key = await importAesKey(secretKey);
      const encrypted = await crypto.subtle.encrypt(
        { name: "AES-CBC", iv },
        key,
        encoder.encode(text)
      );
      return bytesToHex(iv) + ":" + bytesToHex(new Uint8Array(encrypted));
    }

    async function decrypt(text, secretKey) {
      const parts = text.split(":");
      if (parts.length < 2) {
        throw new Error("密文格式错误，应为 ivHex:cipherHex");
      }
      const iv = hexToBytes(parts.shift());
      const encryptedBytes = hexToBytes(parts.join(":"));
      if (iv.length !== 16) {
        throw new Error("IV 长度必须是 16 字节");
      }

      const key = await importAesKey(secretKey);
      const decrypted = await crypto.subtle.decrypt(
        { name: "AES-CBC", iv },
        key,
        encryptedBytes
      );
      return decoder.decode(decrypted);
    }

    async function run(action) {
      clearStatus();
      const secretKey = keyInput.value.trim();
      const input = sourceInput.value;

      if (!secretKey) {
        setStatus("请先输入密钥", "error");
        return;
      }
      if (!input) {
        setStatus("请输入待处理内容", "error");
        return;
      }

      try {
        const result = action === "encrypt"
          ? await encrypt(input, secretKey)
          : await decrypt(input, secretKey);
        resultOutput.value = result;
        setStatus(action === "encrypt" ? "加密成功" : "解密成功", "success");
      } catch (error) {
        setStatus("操作失败：" + error.message, "error");
      }
    }

    document.getElementById("encryptBtn").addEventListener("click", () => run("encrypt"));
    document.getElementById("decryptBtn").addEventListener("click", () => run("decrypt"));

    document.getElementById("copyBtn").addEventListener("click", async () => {
      clearStatus();
      if (!resultOutput.value) {
        setStatus("没有可复制的结果", "error");
        return;
      }
      try {
        await navigator.clipboard.writeText(resultOutput.value);
        setStatus("结果已复制到剪贴板", "success");
      } catch (_) {
        setStatus("复制失败，请手动复制", "error");
      }
    });

    document.getElementById("clearBtn").addEventListener("click", () => {
      sourceInput.value = "";
      resultOutput.value = "";
      clearStatus();
    });
  </script>
</body>
</html>
